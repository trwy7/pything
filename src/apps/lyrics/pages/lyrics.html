{% extends "templates/app.html" %}
{% block head %}
<style>
    html, body {
        overflow: hidden;
        text-align: center;
        margin: 0;
    }
    #status {
        font-size: 2em;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
    #lyrics {
        font-size: 20px;
        transition: transform 500ms;
        transform: translateY(50vh);
        width: calc(100% - 50px);
        padding-left: 25px;
        flex-direction: column;
    }
    .lyric {
        transition: font-size 500ms, color 500ms;
        padding-bottom: 10px;
    }
    .lyric.current {
        font-size: 25px;
        font-weight: 999;
        color: hsl(var(--custom-hue, 151), 100%, 85%);
    }
</style>
{% endblock %}
{% block content %}
<div id="status">
</div>
<div id="lyrics">
</div>
{% endblock %}
{% block script %}
<script>
    // copilot territory
    let automove = true;
    let timedLyrics = [];
    let currentIndex = -1;

    let basePos = 0;              // last reported position from "music"
    let playing = false;
    let lastSyncTs = performance.now();

    const lyricsInner = document.getElementById("lyrics");
    const statusDiv = document.getElementById("status");

    function normalizeLine(line) {
        return line === "" ? "♬" : line;
    }

    function resetLyricsPosition() {
        lyricsInner.style.transform = "translateY(50vh)";
    }

    function setCurrentIndex(nextIndex) {
        if (nextIndex === currentIndex) return;

        if (currentIndex >= 0 && timedLyrics[currentIndex]) {
            timedLyrics[currentIndex].el.classList.remove("current");
        }

        currentIndex = nextIndex;

        if (currentIndex >= 0 && timedLyrics[currentIndex]) {
            const el = timedLyrics[currentIndex].el;
            el.classList.add("current");
            lyricsInner.style.transform = `translateY(calc(50vh - ${el.offsetTop}px))`;
        } else {
            resetLyricsPosition();
        }
    }

    function findCurrentIndexByTime(t) {
        // Binary search: last line with time <= t
        let lo = 0;
        let hi = timedLyrics.length - 1;
        let ans = -1;

        while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            if (timedLyrics[mid].time <= t) {
                ans = mid;
                lo = mid + 1;
            } else {
                hi = mid - 1;
            }
        }
        return ans;
    }

    on("lyrics", (lyr) => {
        lyricsInner.innerHTML = "";
        timedLyrics = [];
        automove = true;
        currentIndex = -1;
        resetLyricsPosition();

        if (typeof lyr === "string") {
            statusDiv.innerText = lyr;
            statusDiv.style.display = "block";
            lyricsInner.style.display = "none";
            return;
        }
        statusDiv.style.display = "none";
        lyricsInner.style.display = "flex";

        for (const rd of lyr) {
            const span = document.createElement("span");
            span.className = "lyric";

            if (typeof rd === "string") {
                automove = false;
                span.textContent = normalizeLine(rd);
            } else {
                const [time, text] = rd;
                span.textContent = normalizeLine(text);
                timedLyrics.push({ time, el: span });
            }

            lyricsInner.appendChild(span);
        }

        // Sync immediately for the currently known playback position
        if (automove && timedLyrics.length) {
            const now = performance.now();
            const effectivePos = basePos + (playing ? (now - lastSyncTs) : 0);
            setCurrentIndex(findCurrentIndexByTime(effectivePos));
        }
    });

    on("music", (tpos) => {
        basePos = tpos[0];
        playing = tpos[1];
        lastSyncTs = performance.now();

        if (automove && timedLyrics.length) {
            const idx = findCurrentIndexByTime(basePos);
            setCurrentIndex(idx);
        }
    });

    function tick() {
        if (automove && timedLyrics.length) {
            const now = performance.now();
            const effectivePos = basePos + (playing ? (now - lastSyncTs) : 0);
            const idx = findCurrentIndexByTime(effectivePos);
            setCurrentIndex(idx);
        }
        requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
    send("open", 0);
</script>
{% endblock %}
