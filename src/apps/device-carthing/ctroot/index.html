<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- TODO: Better banner -->
  <script>
    x = setInterval(
      function() {
        fetch("http://localhost:5192/isready", { method: 'GET' })
        .then(response => {
          if (response.ok) {
            window.location.href = "http://localhost:5192/client?device=carthing";
            clearInterval(x);
          }
        })
        .catch(error => {});
      },
      1000
    )
  </script>
  <style>
    html, body {
      background-color: black;
      color: white;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; margin-top: calc(50vh - 20px); font-size: 40px;">Waiting for server...</h1>
</body>
</html>
