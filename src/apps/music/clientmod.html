<style>
    #music-playbar {
        position: absolute;
        bottom: 5px;
        left: 0;
        margin: 10px;
        margin-bottom: 0px;
        width: calc(100% - 20px);
        border-radius: 9999px;
        background-color: hsla(var(--custom-hue, 151), 18%, 56%, 0.6);
        height: 15px;
        transition: transform 1s;
        transform: translateY(20px);
    }
    #music-playbar.show {
        transform: translateY(0px);
    }
    #music-playbarinner {
        border-radius: 9999px;
        transition: width 2s;
        /* background-color: hsl(var(--custom-hue, 151), 100%, 59%); */
        background: linear-gradient(270deg, hsl(var(--custom-hue, 151), 100%, 59%), hsl(var(--custom-hue, 151), 100%, 30%));
        height: 15px;
    }
    #appframe {
        transition: height 1s;
    }
</style>
<div id="music-playbar">
    <div id="music-playbarinner" style="width: 0%;"></div>
</div>
<script>
    socket.on("music", (d) => {
        if (d[1]) {
            document.getElementById("music-playbar").classList = ["show"]
            document.getElementById("music-playbarinner").style.width = d[0] + "%"
            document.getElementById("appframe").style.height = "calc(100% - 20px)"
        } else {
            document.getElementById("music-playbar").classList = []
            document.getElementById("appframe").style.height = ""
        }
    })
</script>
