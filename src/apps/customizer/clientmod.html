<style>
    body {
        background: linear-gradient(350deg, hsl(var(--custom-hue, 151), 8%, calc(var(--custom-bg, 35%) + 17%)), hsl(var(--custom-hue, 151), 35%, var(--custom-bg, 22%)));
    }
</style>
<script>
    let customizer_current = {hue: 151, background: 24}
    function sendAccent() {
        sendToApp("customizer", customizer_current);
    }
    function setAccent(hue, background) {
        document.documentElement.style.setProperty("--custom-hue", hue);
        document.documentElement.style.setProperty("--custom-bg", background + "%");
        customizer_current = {hue: hue, background: background}
        sendAccent();
    }
    socket.on("customizer", (h) => {
        console.log("Customizer (clientmod): Got colors");
        setAccent(h[0], h[1]);
    })
    socket.emit("customizer+get", 0);
    onAppLoad(sendAccent);
</script>
